services:
  face_recognition_app:
    image: moamen1358/my_face_recognition_app:latest
    container_name: face_recognition_app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    command: /app/start_gpu.sh
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility